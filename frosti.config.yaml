# 网站的基本信息
site:
  tab: AAkoi的技术博客 # 浏览器标签栏上显示的文本
  title: 💠 AAkoi的技术博客 # 网站的标题
  description: 记录硬件设计、FPGA、嵌入式开发的技术博客 # 网站的描述，用于SEO等
  language: zh # 网站的语言，例如 "en" 是英文
  favicon: /favicon.ico # 网站的图标，用于浏览器标签栏和其他地方显示
  theme: # 更多主题 https://daisyui.com/docs/themes/
    light: winter # 主题的浅色模式
    dark: dracula # 主题的深色模式
    code: github-dark-high-contrast # 深色代码块主题，浅色主题会自动配套亮色高对比高亮
  date_format: ddd MMM DD YYYY # 日期格式设置，支持自定义格式
  blog: # 博客相关配置
    pageSize: 8 # 每页显示的文章数量
  menu: # 菜单配置
    - id: home # 菜单项的唯一标识符
      text: 首页 # 菜单项显示的文本
      href: / # 菜单项链接的地址
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: about
      text: 关于
      href: /about
      svg: "material-symbols:info-outline-rounded"
      target: _self
    - id: blog
      text: 博客
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
      subItems:
        - id: all
          text: 全部
          href: /blog
          svg: "material-symbols:ink-pen-outline-rounded"
          target: _self
        - id: notes
          text: 笔记
          href: /blog/category/笔记
          svg: "material-symbols:note-outline-rounded"
          target: _self
        - id: essays
          text: 随笔
          href: /blog/category/随笔
          svg: "material-symbols:edit-note-outline-rounded"
          target: _self
        # 子菜单项配置
    - id: project
      text: 项目
      href: /project
      svg: "material-symbols:code-blocks-outline"
      target: _self
    - id: friend
      text: 友链
      href: /friend
      svg: "material-symbols:supervisor-account-outline-rounded"
      target: _self
    - id: contact
      text: 联系
      href: "https://github.com/AAkoi"
      target: _blank # 在新标签页打开
      svg: "material-symbols:attach-email-outline-rounded"

# 用户的个人信息
user:
  name: Blueaoi # 用户名
  site: "https://aoi-blog-7a7.pages.dev" # 用户的网站链接
  avatar: /profile.png # 用户头像路径
  sidebar: # 侧边栏配置
    social:
      - href: "https://github.com/AAkoi"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
  footer:
    social:
      - href: "https://github.com/AAkoi"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
